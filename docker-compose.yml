
services:
  # ─── PostgreSQL Database ───────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: emotisense-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-emotisense}
      POSTGRES_USER: ${DB_USER:-emotisense_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-emotisense_pass_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - emotisense-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-emotisense_user} -d ${DB_NAME:-emotisense}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Cache ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: emotisense-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - emotisense-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Django Backend ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emotisense-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - model_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - emotisense-network

  # ─── React Frontend ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: emotisense-frontend
    restart: unless-stopped
    volumes:
      - frontend_build:/output
    networks:
      - emotisense-network

  # ─── Nginx Reverse Proxy ──────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: emotisense-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_build:/usr/share/nginx/html:ro
      - backend_static:/usr/share/nginx/static:ro
    depends_on:
      - backend
      - frontend
    networks:
      - emotisense-network

volumes:
  postgres_data:
    driver: local
  backend_static:
    driver: local
  frontend_build:
    driver: local
  model_cache:
    driver: local

networks:
  emotisense-network:
    driver: bridge
